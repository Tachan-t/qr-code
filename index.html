<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #0323b5 0%, #1c96dd47 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        /* Efeito Glassmorphism */
        .glass-card {
            background: rgba(25, 148, 225, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 119, 255, 0.37);
        }
    </style>
</head>
<body class="p-6">

    <div class="glass-card w-full max-w-4xl p-8 flex flex-col md:flex-row gap-8">
        
        <div class="flex-1 space-y-4 text-white">
            <h1 class="text-3xl font-bold mb-6">QR Generator Pro</h1>
            
            <div>
                <label class="block text-sm font-medium mb-1">URL ou Texto</label>
                <input type="text" id="qr-text" placeholder="https://exemplo.com" 
                    class="w-full p-2 rounded-lg bg-white/20 border border-white/30 text-white placeholder-white/60 outline-none focus:ring-2 ring-white/50">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Cor do QR</label>
                    <input type="color" id="color-dark" value="#000000" class="w-full h-10 rounded cursor-pointer bg-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Cor do Fundo</label>
                    <input type="color" id="color-light" value="#ffffff" class="w-col h-10 rounded cursor-pointer bg-transparent">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Estilo dos Pontos</label>
                <select id="dot-style" class="w-full p-2 rounded-lg bg-white/20 border border-white/30 outline-none">
                    <option value="square" class="text-black">Quadrado (Padrão)</option>
                    <option value="rounded" class="text-black">Arredondado</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Logo Central (.png, .jpg)</label>
                <input type="file" id="logo-input" accept="image/*" class="w-full text-sm">
            </div>

            <button id="generate-btn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 transition rounded-xl font-bold uppercase tracking-wider shadow-lg">
                Gerar QR Code
            </button>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center bg-white/10 rounded-2xl p-6 min-h-[300px]">
            <div id="qrcode" class="bg-white p-4 rounded-lg shadow-inner"></div>
            
            <button id="download-btn" class="mt-6 flex items-center gap-2 text-white hover:underline font-semibold">
                <span>⬇️</span> Descarregar PNG
            </button>
        </div>

    </div>

    <script>
        const qrContainer = document.getElementById('qrcode');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        let qrcodeInstance = null;

        // Função principal para gerar o QR Code
        function generateQR() {
            const text = document.getElementById('qr-text').value || "https://github.com";
            const colorDark = document.getElementById('color-dark').value;
            const colorLight = document.getElementById('color-light').value;
            const dotStyle = document.getElementById('dot-style').value;
            const logoFile = document.getElementById('logo-input').files[0];

            // Limpa o QR Code anterior
            qrContainer.innerHTML = "";

            const options = {
                text: text,
                width: 280,
                height: 280,
                colorDark: colorDark,
                colorLight: colorLight,
                // CORREÇÃO DE ERRO: Nível 'H' (High) permite 30% de recuperação, essencial para logos.
                correctLevel: QRCode.CorrectLevel.H, 
                
                // Customização de estilo (Dot Style)
                dotScale: 1,
                quietZone: 15,
                
                // Se arredondado, aplicamos o valor para o estilo
                timing_X: dotStyle === 'rounded' ? { opacity: 1 } : null,
                timing_Y: dotStyle === 'rounded' ? { opacity: 1 } : null,
                
                // Configuração do Logo (será preenchido se houver ficheiro)
                logo: undefined,
                logoWidth: 80, 
                logoHeight: 80,
                logoBackgroundTransparent: false
            };

            // Lógica para processar o logo se existir
            if (logoFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    options.logo = e.target.result;
                    renderQR(options);
                };
                reader.readAsDataURL(logoFile);
            } else {
                renderQR(options);
            }
        }

        function renderQR(options) {
            qrcodeInstance = new QRCode(qrContainer, options);
        }

        // Função de Download
        downloadBtn.onclick = function() {
            const canvas = qrContainer.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'meu-qrcode.png';
                link.href = canvas.toDataURL();
                link.click();
            } else {
                alert("Gere um QR Code primeiro!");
            }
        };

        generateBtn.onclick = generateQR;

        // Gerar um inicial ao carregar a página
        window.onload = generateQR;
    </script>
</body>
</html>
